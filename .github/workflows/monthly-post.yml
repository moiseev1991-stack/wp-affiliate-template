name: Monthly Post Generation

# Generates one new SEO article per month using OpenAI gpt-4o-mini, commits the
# .mdx + .svg, then deploys the static site to Cloudflare Workers.
#
# Runs on the 1st of each month at 09:00 UTC (12:00 Moscow time).
# Manual run via workflow_dispatch always available.

on:
  schedule:
    - cron: '0 9 1 * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Generate post
        run: node scripts/generate-post.mjs
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o-mini' }}

      - name: Commit and push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add content/posts/ public/illustrations/
          git diff --staged --quiet || (git commit -m "content: add monthly auto post" && git push)

      - name: Build static site
        run: npx next build

      - name: Deploy to Cloudflare
        if: success() && env.CLOUDFLARE_API_TOKEN != ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
