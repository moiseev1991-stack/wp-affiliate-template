name: Monthly Auto Post

# Fires daily; the generator script no-ops on every day except the site's
# chosen monthly day (siteConfig.monthlyPostDay, picked deterministically from
# the domain seed at scaffold time and stored in scripts/generation.config.json).
#
# This means two sites scaffolded from the same template post on different
# days of the month — no synchronized publishing pattern across the network.

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force generation regardless of day-of-month'
        required: false
        default: 'false'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Generate post (gated by day-of-month)
        run: node scripts/generate-post.mjs
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o-mini' }}
          FORCE: ${{ github.event.inputs.force == 'true' && '1' || '' }}

      - name: Commit and push if a new post was created
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add content/posts/ public/illustrations/
          git diff --staged --quiet && echo "No new post today — nothing to commit." || (git commit -m "content: monthly auto post" && git push)

      - name: Build static site
        if: success()
        run: |
          if git log -1 --pretty=%B | grep -q "monthly auto post"; then
            npx next build
          else
            echo "No new post — skipping build."
          fi

      - name: Deploy to Cloudflare
        if: success() && env.CLOUDFLARE_API_TOKEN != ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if git log -1 --pretty=%B | grep -q "monthly auto post"; then
            npx wrangler deploy
          else
            echo "No new post — skipping deploy."
          fi
